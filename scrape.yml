name: Daily Lead Scrape San Antonio

"on":
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright pandas

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Create output directories
        run: |
          mkdir -p data dashboard exports

      - name: Run scraper
        run: python fetch.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Show scrape summary
        run: |
          echo "=== LEADS SUMMARY ==="
          python -c "
          import json
          with open('data/leads.json') as f:
              d = json.load(f)
          print(f'Total scraped: {d[\"total\"]}')
          print(f'Qualified leads: {d[\"qualified\"]}')
          print(f'Fetched at: {d[\"fetched_at\"]}')
          "

      - name: Commit and push updated records
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/leads.json dashboard/leads.json exports/ghl.csv
          git diff --cached --quiet || git commit -m "update leads $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
